<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo">Notes</h1>
            <div class="header-actions">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search notes..." aria-label="Search notes">
                </div>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
                    <!-- Sun Icon for switching to Light mode -->
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <!-- Moon Icon for switching to Dark mode -->
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">📝</div>
            <h2>No notes yet</h2>
            <p>Click the add button to create your first note.</p>
        </div>
        
        <div class="notes-grid" id="notes-grid">
            <!-- Notes will be dynamically added here -->
        </div>
    </main>

    <button id="fab-add" class="fab" aria-label="Add note">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div id="note-modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Note</h2>
                <button id="close-modal" class="close-btn" aria-label="Close modal">&times;</button>
            </div>
            <form id="note-form">
                <input type="hidden" id="note-id">
                <div class="form-group">
                    <input type="text" id="note-title-input" placeholder="Title" required autocomplete="off">
                </div>
                <div class="form-group">
                    <textarea id="note-desc-input" placeholder="Take a note..." required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="btn btn-text">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
